spring.application.name=app-service

# ── utility-service integration ───────────────────────────────────────────────
# Base URL of the PDF microservice. Override per environment (Docker, K8s, etc.)
utility.service.url=http://localhost:8080

spring.mustache.suffix=.html
spring.output.ansi.enabled=ALWAYS

# ── HTTPS / SSL ──────────────────────────────────────────────────────────────
server.port=8443
server.ssl.enabled=true
server.ssl.key-store=classpath:keystore.p12
server.ssl.key-store-type=PKCS12
server.ssl.key-store-password=${KEYSTORE_PASSWORD:123456}
server.ssl.key-alias=ecomostoles

# ── MySQL Database ────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/ecomostoles?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false
app.sustainability.default-co2-factor=0.45

# ── Multipart / File Upload Limits ─────────────────────────────────────────────
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
server.tomcat.max-swallow-size=10MB
spring.servlet.multipart.resolve-lazily=true

# ── SpringDoc / OpenAPI (Swagger UI) ─────────────────────────────────────────
# Only scan the REST API subpackage — keeps MVC/Mustache controllers out of docs
springdoc.packagesToScan=es.urjc.ecomostoles.backend.controller.api
# Human-friendly Swagger UI path
springdoc.swagger-ui.path=/swagger-ui.html
# Disable the default /api-docs redirect to avoid confusion with our own paths
springdoc.api-docs.path=/v3/api-docs
# Sort operations alphabetically in the UI
springdoc.swagger-ui.operationsSorter=alpha
springdoc.swagger-ui.tagsSorter=alpha
# Expand all operations by default for easier review
springdoc.swagger-ui.docExpansion=none