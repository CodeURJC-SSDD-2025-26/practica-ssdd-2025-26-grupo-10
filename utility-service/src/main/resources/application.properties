# ─────────────────────────────────────────────────────────────────────────────
# utility-service — application.properties
#
# PORT: 8081 to avoid conflict with app-service (which runs on 8443 via HTTPS
# or 8080 in dev). Adjust freely if your environment uses different ports.
# ─────────────────────────────────────────────────────────────────────────────

spring.application.name=utility-service

# Network isolation: use 8081 so it never collides with app-service (8080/8443)
server.port=8081

# ── Actuator ─────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# ── Logging ──────────────────────────────────────────────────────────────────
logging.level.es.urjc.ecomostoles.utility=DEBUG
