spring.application.name=backend
spring.mustache.suffix=.html
spring.output.ansi.enabled=ALWAYS

# ── HTTPS / SSL ──────────────────────────────────────────────────────────────
server.port=8443
server.ssl.enabled=true
server.ssl.key-store=classpath:keystore.p12
server.ssl.key-store-type=PKCS12
server.ssl.key-store-password=${KEYSTORE_PASSWORD:123456}
server.ssl.key-alias=ecomostoles

# ── MySQL Database ────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/ecomostoles?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD:dnaljvgll}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false
app.sustainability.default-co2-factor=0.45

# ── Multipart / File Upload Limits ─────────────────────────────────────────────
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
server.tomcat.max-swallow-size=10MB
spring.servlet.multipart.resolve-lazily=true