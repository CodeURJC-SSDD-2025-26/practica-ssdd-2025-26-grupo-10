{{> header}}

<div class="row justify-content-center w-100 flex-grow-1 align-items-center mt-5 pt-5 mb-5">
    <div class="col-md-8 col-lg-6">
        <div class="card p-4 p-md-5 border-top-success shadow-sm">
            <div class="card-body">
                <div class="text-center mb-4">
                    <a href="/" class="text-decoration-none">
                        <h1 class="h2 fw-bold text-dark"><i class="fas fa-recycle text-success me-2"></i>EcoMóstoles</h1>
                    </a>
                    <h4 class="mt-3 text-dark fw-bold">Alta de Nueva Empresa</h4>
                    <p class="text-secondary">Únete a la mayor red de simbiosis industrial de Móstoles</p>
                </div>
                
                {{#error}}
                <div class="alert alert-danger py-2 small fw-bold text-center" role="alert">
                    <i class="fas fa-exclamation-triangle me-1"></i> Este email ya está registrado. Por favor, inicia sesión.
                </div>
                {{/error}}
                
                <form action="/registro" method="POST" enctype="multipart/form-data" class="needs-validation" novalidate="">
                    {{#_csrf}}<input type="hidden" name="_csrf" value="{{token}}">{{/_csrf}}
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label for="nombreEmpresa" class="form-label fw-bold small text-uppercase text-secondary">Nombre Comercial</label>
                            <input type="text" name="nombreComercial" class="form-control" id="nombreEmpresa" placeholder="Ej. Metales del Sur S.L." required="">
                        </div>
                        
                        <div class="col-md-6">
                            <label for="cif" class="form-label fw-bold small text-uppercase text-secondary">CIF / NIF</label>
                            <input type="text" name="cif" class="form-control" id="cif" placeholder="B-12345678" required="">
                        </div>
                        
                        <div class="col-12">
                            <label for="direccion" class="form-label fw-bold small text-uppercase text-secondary">Dirección / Polígono</label>
                            <select name="direccion" class="form-select" id="direccion" required="">
                                <option value="" selected="" disabled="">Selecciona tu ubicación...</option>
                                <option value="regordono">Polígono Industrial Regordoño</option>
                                <option value="arroyomolinos">Polígono Industrial Arroyomolinos</option>
                                <option value="nieves">Polígono Industrial Las Nieves</option>
                                <option value="otro">Otro (Especificar)</option>
                            </select>
                        </div>

                        <div class="col-md-6">
                            <label for="sector" class="form-label fw-bold small text-uppercase text-secondary">Sector Industrial</label>
                            <select name="sector" class="form-select" id="sector" required="">
                                <option value="" selected="" disabled="">Seleccionar...</option>
                                <option value="metal">Metalúrgico</option>
                                <option value="quimico">Químico</option>
                                <option value="madera">Madera y Mueble</option>
                                <option value="logistica">Logística y Transporte</option>
                                <option value="agro">Agroalimentario</option>
                                <option value="construccion">Construcción</option>
                            </select>
                        </div>

                        <div class="col-md-6">
                            <label for="email" class="form-label fw-bold small text-uppercase text-secondary">Email de Contacto</label>
                            <input type="email" name="emailContacto" class="form-control" id="email" placeholder="contacto@empresa.com" required="">
                        </div>

                        <div class="col-md-6">
                            <label for="password" class="form-label fw-bold small text-uppercase text-secondary">Contraseña</label>
                            <input type="password" name="password" class="form-control" id="password" required="">
                        </div>
                        
                        <div class="col-md-6">
                            <label for="confirmPassword" class="form-label fw-bold small text-uppercase text-secondary">Confirmar Contraseña</label>
                            <input type="password" class="form-control" id="confirmPassword" required="">
                        </div>

                        <div class="col-12 mt-4">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" value="" id="terminos" required="">
                                <label class="form-check-label small text-secondary" for="terminos">
                                    Acepto los <a href="/terminos" class="text-success text-decoration-none">Términos y Condiciones</a> y la Política de Privacidad de EcoMóstoles.
                                </label>
                            </div>
                        </div>

                        <div class="col-12">
                            <label for="logoFile" class="form-label fw-bold small text-uppercase text-secondary">Logo de la Empresa <span class="text-muted fw-normal">(Opcional)</span></label>
                            <input type="file" class="form-control" id="logoFile" name="logoFile" accept="image/*">
                        </div>

                        <div class="col-12 d-grid mt-4">
                            <button type="submit" class="btn btn-primary py-2 fw-bold">Crear Cuenta de Empresa</button>
                        </div>
                    </div>
                    
                    <div class="text-center mt-4">
                        <p class="small text-secondary mb-0">¿Ya tienes cuenta? <a href="/login" class="text-success fw-bold text-decoration-none">Inicia Sesión</a></p>
                    </div>
                </form>
            </div>
        </div>
        <div class="text-center mt-4">
            <a href="/" class="btn btn-outline-secondary btn-sm"><i class="fas fa-arrow-left me-1"></i> Volver al Inicio</a>
        </div>
    </div>
</div>

{{> footer}}
