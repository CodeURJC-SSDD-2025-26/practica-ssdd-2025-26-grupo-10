<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="/img/favicon.svg">
    <meta name="description" content="EcoMóstoles - Plataforma B2B de Simbiosis Industrial y Economía Circular. Conecta ofertas de residuos y demandas de maquinaria en el ámbito local.">
    <title>{{#pageTitle}}{{pageTitle}} | {{/pageTitle}}EcoMóstoles</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="/css/styles.css" rel="stylesheet">
</head>
<body class="bg-theme-dark">
    <!-- Particles Background -->
    <div id="particles-body"></div>

    <nav class="navbar navbar-expand-lg fixed-top navbar-custom">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="fas fa-recycle me-2"></i>EcoMóstoles
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    
                    {{#empresa}}
                    <!-- LOGGED-IN NAV -->
                    <li class="nav-item">
                        <a class="nav-link {{#navMercado}}active text-success fw-bold{{/navMercado}}" href="/mercado">
                            <i class="fas fa-store me-1"></i> Ofertas
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {{#navDemandas}}active text-success fw-bold{{/navDemandas}}" href="/solicitudes">
                            <i class="fas fa-bullhorn me-1"></i> Demandas
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {{#navDashboard}}active text-success fw-bold{{/navDashboard}}" href="/dashboard">
                            <i class="fas fa-tachometer-alt me-1"></i> Panel de Control
                        </a>
                    </li>
                    <li class="nav-item dropdown ms-lg-2">
                        <a class="nav-link dropdown-toggle d-flex align-items-center" href="#" role="button" data-bs-toggle="dropdown">
                            <img src="/images/empresa/{{id}}" alt="Logo Empresa" class="rounded-circle object-fit-cover me-2 avatar-navbar" onerror="this.src='/img/logo.webp';">
                            <span>{{nombreComercial}}</span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end border-0 shadow-lg mt-2 p-2 dropdown-rounded">
                            <li><h6 class="dropdown-header text-uppercase small fw-bold">Mi Cuenta</h6></li>
                            <li><a class="dropdown-item rounded" href="/perfil"><i class="fas fa-user-circle me-2"></i> Mi Perfil</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item rounded text-danger" href="/logout"><i class="fas fa-sign-out-alt me-2"></i> Cerrar Sesión</a></li>
                        </ul>
                    </li>
                    {{/empresa}}

                    {{^empresa}}
                    <!-- VISITOR NAV -->
                    <li class="nav-item">
                        <a class="nav-link active" href="/">Inicio</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/mercado">Ofertas</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/login">Login</a>
                    </li>
                    <li class="nav-item ms-lg-2">
                        <a class="btn btn-eco btn-sm" href="/registro">Registro Empresa</a>
                    </li>
                    {{/empresa}}

                </ul>
            </div>
        </div>
    </nav>
