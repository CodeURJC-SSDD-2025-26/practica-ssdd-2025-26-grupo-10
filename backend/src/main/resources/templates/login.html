{{> header}}

<div class="row justify-content-center w-100 flex-grow-1 align-items-center mt-5 pt-5">
    <div class="col-md-5 col-lg-4">
        <div class="card p-4 border-top-success shadow-sm">
            <div class="card-body">
                <div class="text-center mb-4">
                    <a href="/" class="text-decoration-none">
                        <h1 class="h2 fw-bold text-dark"><i class="fas fa-recycle text-success me-2"></i>EcoMóstoles</h1>
                    </a>
                    <p class="text-muted small fw-bold text-uppercase ls-wide">Acceso para Empresas</p>
                </div>
                
                {{#error}}
                <div class="alert alert-danger py-2 small fw-bold text-center" role="alert">
                    <i class="fas fa-exclamation-triangle me-1"></i> Credenciales incorrectas.
                </div>
                {{/error}}
                
                <form action="/login" method="POST" class="needs-validation" novalidate="">
                    {{#_csrf}}<input type="hidden" name="_csrf" value="{{token}}">{{/_csrf}}
                    <div class="mb-3">
                        <label for="email" class="form-label fw-bold small text-uppercase text-secondary">Email Corporativo</label>
                        <input type="email" name="username" class="form-control" id="email" placeholder="nombre@empresa.com" required="">
                    </div>
                    
                    <div class="mb-4">
                        <label for="password" class="form-label fw-bold small text-uppercase text-secondary">Contraseña</label>
                        <input type="password" name="password" class="form-control" id="password" placeholder="••••••••" required="">
                        <div class="text-end mt-2">
                            <a href="#" class="small text-muted text-decoration-none">¿Olvidaste tu contraseña?</a>
                        </div>
                    </div>
                    
                    <div class="d-grid mb-3">
                        <button type="submit" class="btn btn-primary py-2 fw-bold">Entrar al Panel</button>
                    </div>
                    
                    <div class="text-center mt-4">
                        <p class="small text-muted mb-0">¿Aún no tienes cuenta? <a href="/registro" class="text-success fw-bold text-decoration-none">Regístrate aquí</a></p>
                    </div>
                </form>
            </div>
        </div>
        
        <div class="text-center mt-4 mb-5">
            <a href="/" class="btn btn-outline-secondary btn-sm"><i class="fas fa-arrow-left me-1"></i> Volver al Inicio</a>
        </div>
    </div>
</div>

{{> footer}}
