<!DOCTYPE html>
<html lang="es">
{{> head}}
<body class="bg-theme-dark">
{{> header}}

<div class="container-fluid">
    <div class="row min-vh-100">
        <!-- Sidebar -->
        {{> sidebar}}

        <!-- Main Content -->
        {{#acuerdo}}
        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4" 
              data-unidad="{{unidad}}" 
              data-estado="{{estado}}">
            <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                <h1 class="h2 text-dark fw-bold">Editar Acuerdo <span class="text-muted fs-6">#ACU-{{id}}</span></h1>
                <div class="btn-toolbar mb-2 mb-md-0">
                    <a href="/acuerdos/{{id}}" class="btn btn-sm btn-outline-secondary rounded-pill">
                        <i class="fas fa-arrow-left me-1"></i> Cancelar
                    </a>
                </div>
            </div>

            <div class="card card-modern border-top border-primary border-4 shadow-sm">
                <div class="card-body p-4">
                    <form action="/acuerdos/{{id}}/editar" method="POST" class="needs-validation">
                        {{#_csrf}}<input type="hidden" name="_csrf" value="{{token}}">{{/_csrf}}
                        
                        <div class="row g-3">
                            <div class="col-12">
                                <label for="materialIntercambiado" class="form-label text-secondary fw-bold small text-uppercase">Material / Concepto <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="materialIntercambiado" name="materialIntercambiado" value="{{materialIntercambiado}}" required>
                                <div class="invalid-feedback">Por favor, indica el material.</div>
                            </div>

                            <div class="col-md-6">
                                <label for="cantidad" class="form-label text-secondary fw-bold small text-uppercase">Cantidad <span class="text-danger">*</span></label>
                                <input type="number" class="form-control" id="cantidad" name="cantidad" value="{{cantidad}}" step="0.01" min="0" required>
                                <div class="invalid-feedback">Indica la cantidad.</div>
                            </div>

                            <div class="col-md-6">
                                <label for="unidad" class="form-label text-secondary fw-bold small text-uppercase">Unidad <span class="text-danger">*</span></label>
                                <select class="form-select" id="unidad" name="unidad" required>
                                    <option value="kg">kg</option>
                                    <option value="ton">toneladas</option>
                                    <option value="uds">unidades</option>
                                    <option value="m2">m²</option>
                                    <option value="L">litros</option>
                                </select>
                            </div>

                            <div class="col-md-6">
                                <label for="precioAcordado" class="form-label text-secondary fw-bold small text-uppercase">Precio Acordado (EUR) <span class="text-danger">*</span></label>
                                <div class="input-group">
                                    <input type="number" class="form-control" id="precioAcordado" name="precioAcordado" value="{{precioAcordado}}" step="0.01" min="0" required>
                                    <span class="input-group-text">€</span>
                                </div>
                                <div class="invalid-feedback">Por favor, indica el price.</div>
                            </div>

                            <div class="col-md-6">
                                <label for="estado" class="form-label text-secondary fw-bold small text-uppercase">Estado del Acuerdo <span class="text-danger">*</span></label>
                                <select class="form-select" id="estado" name="estado" required>
                                    <option value="PENDIENTE">Pendiente de firma</option>
                                    <option value="EN_CURSO">En curso / Procesando</option>
                                    <option value="COMPLETADO">Completado / Finalizado</option>
                                    <option value="ACEPTADO">Aceptado</option>
                                    <option value="RECHAZADO">Rechazado</option>
                                </select>
                            </div>

                            <div class="col-12">
                                <label for="notas" class="form-label text-secondary fw-bold small text-uppercase">Notas Adicionales</label>
                                <textarea class="form-control" id="notas" name="notas" rows="4">{{#notas}}{{notas}}{{/notas}}</textarea>
                            </div>

                            <div class="col-12 mt-4 d-flex justify-content-end gap-2">
                                <button type="submit" class="btn btn-success px-5 fw-bold rounded-pill shadow-sm">
                                    <i class="fas fa-save me-2"></i> Guardar Cambios
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
            {{/acuerdo}}
        </main>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        const main = document.querySelector('main');
        const unidad = main.getAttribute('data-unidad');
        const estado = main.getAttribute('data-estado');
        if (unidad) document.getElementById("unidad").value = unidad;
        if (estado) document.getElementById("estado").value = estado;
    });
</script>

{{> footer}}
</body>
</html>
