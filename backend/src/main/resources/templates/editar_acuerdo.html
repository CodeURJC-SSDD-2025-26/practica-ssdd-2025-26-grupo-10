{{> head}}
<body class="bg-theme-dark">
{{> header}}

<div class="container-fluid">
    <div class="row min-vh-100">
        <!-- Sidebar -->
        {{#isAdmin}}{{> sidebar_admin}}{{/isAdmin}}
        {{^isAdmin}}{{> sidebar}}{{/isAdmin}}

        <!-- Main Content -->
        {{#agreement}}
        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">
            <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                <h1 class="h2 text-dark fw-bold">Editar Acuerdo <span class="text-muted fs-6">#ACU-{{id}}</span></h1>
                <div class="btn-toolbar mb-2 mb-md-0">
                    <a href="/acuerdos/{{id}}" class="btn btn-sm btn-outline-secondary rounded-pill">
                        <i class="fas fa-arrow-left me-1"></i> Cancelar
                    </a>
                </div>
            </div>

            <div class="card card-modern border-top border-primary border-4 shadow-sm">
                <div class="card-body p-4">
                    <form action="/acuerdos/{{id}}/editar" method="POST" class="needs-validation">
                        {{#_csrf}}<input type="hidden" name="_csrf" value="{{token}}">{{/_csrf}}
                        
                        <div class="row g-3">
                            <div class="col-12">
                                <label for="exchangedMaterial" class="form-label text-secondary fw-bold small text-uppercase">Material / Concepto <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="exchangedMaterial" name="exchangedMaterial" value="{{exchangedMaterial}}" required>
                                <div class="invalid-feedback">Por favor, indica el material.</div>
                            </div>

                            <div class="col-md-6">
                                <label for="quantity" class="form-label text-secondary fw-bold small text-uppercase">Cantidad <span class="text-danger">*</span></label>
                                <input type="number" class="form-control" id="quantity" name="quantity" value="{{quantity}}" step="0.01" min="0" required>
                                <div class="invalid-feedback">Indica la cantidad.</div>
                            </div>

                            <div class="col-md-6">
                                <label for="unit" class="form-label text-secondary fw-bold small text-uppercase">Unidad <span class="text-danger">*</span></label>
                                <select class="form-select" id="unit" name="unit" required>
                                    {{#unitOptions}}
                                    <option value="{{value}}" {{#selected}}selected{{/selected}}>{{label}}</option>
                                    {{/unitOptions}}
                                </select>
                            </div>

                            <div class="col-md-6">
                                <label for="agreedPrice" class="form-label text-secondary fw-bold small text-uppercase">Precio Acordado (EUR) <span class="text-danger">*</span></label>
                                <div class="input-group">
                                    <input type="number" class="form-control" id="agreedPrice" name="agreedPrice" value="{{agreedPrice}}" step="0.01" min="0" required>
                                    <span class="input-group-text">€</span>
                                </div>
                                <div class="invalid-feedback">Por favor, indica el price.</div>
                            </div>

                            <div class="col-md-6">
                                <label for="status" class="form-label text-secondary fw-bold small text-uppercase">Estado del Acuerdo <span class="text-danger">*</span></label>
                                <select class="form-select" id="status" name="status" required>
                                    {{#statusOptions}}
                                    <option value="{{value}}" {{#selected}}selected{{/selected}}>{{label}}</option>
                                    {{/statusOptions}}
                                </select>
                            </div>

                            <div class="col-md-6">
                                <label for="pickupDate" class="form-label text-secondary fw-bold small text-uppercase">Fecha de Recogida</label>
                                <input type="date" class="form-control" id="pickupDate" name="pickupDate" value="{{#pickupDate}}{{pickupDate}}{{/pickupDate}}">
                            </div>

                            <div class="col-12">
                                <label for="notes" class="form-label text-secondary fw-bold small text-uppercase">Notas Adicionales</label>
                                <textarea class="form-control" id="notes" name="notes" rows="4">{{#notes}}{{notes}}{{/notes}}</textarea>
                            </div>

                            <div class="col-12 mt-4 d-flex justify-content-end gap-2">
                                <button type="submit" class="btn btn-success px-5 fw-bold rounded-pill shadow-sm">
                                    <i class="fas fa-save me-2"></i> Guardar Cambios
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
            {{/agreement}}
        </main>
    </div>
</div>


{{> footer}}
