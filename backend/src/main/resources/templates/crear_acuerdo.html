{{> head}}
<body class="bg-theme-dark">
{{> header}}

<div class="container-fluid">
    <div class="row min-vh-100">
        <!-- Sidebar -->
        {{#isAdmin}}{{> sidebar_admin}}{{/isAdmin}}
        {{^isAdmin}}{{> sidebar}}{{/isAdmin}}

        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">
            <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                <h1 class="h2 text-dark fw-bold">Registrar Nuevo Acuerdo</h1>
                <div class="btn-toolbar mb-2 mb-md-0">
                    <a href="/dashboard/mis-acuerdos" class="btn btn-sm btn-outline-secondary rounded-pill"><i class="fas fa-arrow-left me-1"></i> Cancelar</a>
                </div>
            </div>

            <div class="card card-modern border-top-success">
                <div class="card-body p-4">
                    {{#errors}}
                      <div class="alert alert-danger" role="alert">
                        <i class="fas fa-exclamation-triangle"></i> {{defaultMessage}}
                      </div>
                    {{/errors}}
                    <form action="/acuerdo/nuevo" method="POST" class="needs-validation" novalidate="">
                        {{#_csrf}}<input type="hidden" name="_csrf" value="{{token}}">{{/_csrf}}
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label text-secondary fw-bold small text-uppercase">Oferta Relacionada <span class="text-danger">*</span></label>
                                <select name="offerId" class="form-select" required="">
                                    <option value="" selected="" disabled="">Seleccionar tu oferta...</option>
                                    {{#offers}}
                                    <option value="{{id}}">REF-{{id}}: {{title}}</option>
                                    {{/offers}}
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label text-secondary fw-bold small text-uppercase">Empresa Destino <span class="text-danger">*</span></label>
                                <select name="destinationCompanyId" class="form-select" required="">
                                    <option value="" selected="" disabled="">Seleccionar empresa...</option>
                                    {{#companies}}
                                    <option value="{{id}}">{{commercialName}}</option>
                                    {{/companies}}
                                </select>
                            </div>

                            <div class="col-md-5">
                                <label class="form-label text-secondary fw-bold small text-uppercase">Cantidad <span class="text-danger">*</span></label>
                                <div class="input-group">
                                    <input type="number" name="quantity" class="form-control" placeholder="Ej. 500" min="0" value="{{#agreement.quantity}}{{agreement.quantity}}{{/agreement.quantity}}" required="">
                                    <select name="unit" class="form-select" style="max-width: 120px;" required>
                                        {{#unitList}}
                                        <option value="{{.}}">{{.}}</option>
                                        {{/unitList}}
                                    </select>
                                </div>
                            </div>

                            <div class="col-md-3">
                                <label class="form-label text-secondary fw-bold small text-uppercase">Precio Acordado (€) <span class="text-danger">*</span></label>
                                 <input type="number" name="agreedPrice" class="form-control" placeholder="Ej. 1200" step="0.01" min="0" value="{{#agreement.agreedPrice}}{{agreement.agreedPrice}}{{/agreement.agreedPrice}}" required="">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label text-secondary fw-bold small text-uppercase">Fecha de Recogida <span class="text-danger">*</span></label>
                                 <input type="date" name="pickupDate" class="form-control" value="{{#agreement.pickupDate}}{{agreement.pickupDate}}{{/agreement.pickupDate}}" required="">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label text-secondary fw-bold small text-uppercase">Estado <span class="text-danger">*</span></label>
                                <select name="status" class="form-select" required="">
                                    <option value="PENDING" selected="">Pendiente</option>
                                    <option value="ACCEPTED">Aceptado</option>
                                    <option value="REJECTED">Rechazado</option>
                                </select>
                            </div>

                            <div class="col-12">
                                <label class="form-label text-secondary fw-bold small text-uppercase">Notas adicionales</label>
                                 <textarea name="notes" class="form-control" rows="3" placeholder="Condiciones especiales, requisitos...">{{#agreement.notes}}{{agreement.notes}}{{/agreement.notes}}</textarea>
                            </div>

                            <div class="col-12 mt-4 d-flex justify-content-end">
                                <button type="submit" class="btn btn-primary px-4 fw-bold">
                                    <i class="fas fa-handshake me-2"></i> Registrar Acuerdo
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>
</div>

{{> footer}}
