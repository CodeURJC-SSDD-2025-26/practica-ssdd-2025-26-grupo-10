{{> header}}

<div class="row justify-content-center w-100 flex-grow-1 align-items-center mt-5 pt-5">
    <div class="col-md-5 col-lg-4">
        <div class="card p-4 border-top-success shadow-sm">
            <div class="card-body">
                <div class="text-center mb-4">
                    <h1 class="h3 fw-bold text-dark"><i class="fas fa-key text-success me-2"></i>Recuperar Contraseña</h1>
                    <p class="text-muted small">Introduce tu email para solicitar un nuevo acceso</p>
                </div>
                
                <form action="/recuperar-password" method="POST" class="needs-validation" novalidate="">
                    {{#_csrf}}<input type="hidden" name="_csrf" value="{{token}}">{{/_csrf}}
                    <div class="mb-4">
                        <label for="email" class="form-label fw-bold small text-uppercase text-secondary">Email de la Empresa</label>
                        <input type="email" name="email" class="form-control" id="email" placeholder="nombre@empresa.com" required="">
                        <div class="invalid-feedback">Por favor, introduce un email válido.</div>
                    </div>
                    
                    <div class="d-grid mb-3">
                        <button type="submit" class="btn btn-success py-2 fw-bold">Enviar enlace de recuperación</button>
                    </div>
                </form>
                
                <div class="text-center mt-4">
                    <p class="small text-muted mb-0">¿Recordaste tu contraseña? <a href="/login" class="text-success fw-bold text-decoration-none">Volver al Login</a></p>
                </div>
            </div>
        </div>
        
        <div class="text-center mt-4 mb-5">
            <a href="/" class="btn btn-outline-secondary btn-sm"><i class="fas fa-arrow-left me-1"></i> Volver al Inicio</a>
        </div>
    </div>
</div>

<script src="/js/form-validation.js"></script>

{{> footer}}
