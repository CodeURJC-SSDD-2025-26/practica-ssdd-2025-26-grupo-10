{{> head}}
<body class="bg-theme-dark d-flex flex-column min-vh-100">
{{> header}}

<main class="container flex-grow-1 d-flex align-items-center justify-content-center py-5">
    <div class="row justify-content-center w-100">
        <div class="col-md-5 col-lg-4">
            <div class="card p-4 border-top-success shadow-sm rounded-4">
                <div class="card-body">
                    <div class="text-center mb-4">
                        <div class="bg-success bg-opacity-10 p-3 rounded-circle d-inline-block mb-3">
                            <i class="fas fa-key text-success fa-2x"></i>
                        </div>
                        <h1 class="h3 fw-bold text-dark">Recuperar Contraseña</h1>
                        <p class="text-muted small">Introduce tu email corporativo para recibir las instrucciones de reinicio.</p>
                    </div>
                    
                    <form action="/recuperar-password" method="POST" class="needs-validation" novalidate="">
                        {{#_csrf}}<input type="hidden" name="_csrf" value="{{token}}">{{/_csrf}}
                        <div class="mb-4">
                            <label for="email" class="form-label fw-bold small text-uppercase text-secondary">Email de la Empresa</label>
                            <input type="email" name="email" class="form-control" id="email" placeholder="nombre@empresa.com" required="">
                            <div class="invalid-feedback">Por favor, introduce un email válido.</div>
                        </div>
                        
                        <div class="d-grid mb-3">
                            <button type="submit" class="btn btn-primary py-2 fw-bold rounded-pill shadow-sm">Enviar enlace de recuperación</button>
                        </div>
                    </form>
                    
                    <div class="text-center mt-4">
                        <p class="small text-muted mb-0">¿Ya recordaste tu contraseña? <a href="/login" class="text-success fw-bold text-decoration-none">Volver al Login</a></p>
                    </div>
                </div>
            </div>
            
            <div class="text-center mt-4 mb-5">
                <a href="/" class="btn btn-outline-secondary btn-sm rounded-pill"><i class="fas fa-arrow-left me-1"></i> Volver al Inicio</a>
            </div>
        </div>
    </div>
</main>

{{> footer}}
