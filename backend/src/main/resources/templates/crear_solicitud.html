{{> header}}

<div class="container-fluid">
    <div class="row min-vh-100">
        {{> sidebar}}

        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">
            <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                <h1 class="h2 text-dark fw-bold">Publicar Nueva Demanda</h1>
                <div class="btn-toolbar mb-2 mb-md-0">
                    <a href="/dashboard/mis-demandas" class="btn btn-sm btn-outline-secondary rounded-pill"><i class="fas fa-arrow-left me-1"></i> Cancelar</a>
                </div>
            </div>

            <div class="card card-modern border-top-success">
                <div class="card-body p-4">
                    {{#errores}}
                    <div class="alert alert-danger d-flex align-items-center" role="alert">
                        <i class="fas fa-exclamation-triangle me-2"></i>
                        <span>{{defaultMessage}}</span>
                    </div>
                    {{/errores}}
                    <form action="/demanda/nueva" method="POST" class="needs-validation" novalidate>
                        {{#_csrf}}<input type="hidden" name="_csrf" value="{{token}}">{{/_csrf}}
                        <div class="row g-3">
                            <div class="col-md-8">
                                <label class="form-label text-secondary fw-bold small text-uppercase">Título de lo que buscas <span class="text-danger">*</span></label>
                                <input type="text" name="titulo" class="form-control" placeholder="Ej. Busco Palés Europeos en buen estado" value="{{#demanda.titulo}}{{demanda.titulo}}{{/demanda.titulo}}" required="">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label text-secondary fw-bold small text-uppercase">Categoría <span class="text-danger">*</span></label>
                                <select name="categoriaMaterial" class="form-select" required>
                                    <option value="" selected="" disabled="">Seleccionar...</option>
                                    <option value="Metal">Metal</option>
                                    <option value="Madera">Madera</option>
                                    <option value="Plástico">Plástico</option>
                                    <option value="Químico">Químico</option>
                                    <option value="Maquinaria">Maquinaria</option>
                                </select>
                            </div>
                            
                            <div class="col-12">
                                <label class="form-label text-secondary fw-bold small text-uppercase">Descripción detallada <span class="text-danger">*</span></label>
                                <textarea name="descripcion" class="form-control" rows="4" placeholder="Describe qué material necesitas..." required="">{{#demanda.descripcion}}{{demanda.descripcion}}{{/demanda.descripcion}}</textarea>
                            </div>

                            <div class="col-md-4">
                                <label class="form-label text-secondary fw-bold small text-uppercase">Cantidad requerida</label>
                                <div class="input-group">
                                    <input type="number" name="cantidad" class="form-control" placeholder="Ej. 500" min="0" value="{{#demanda.cantidad}}{{demanda.cantidad}}{{/demanda.cantidad}}">
                                    <span class="input-group-text">kg/uds</span>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label text-secondary fw-bold small text-uppercase">Urgencia</label>
                                <select name="urgencia" class="form-select">
                                    <option value="alta">🔴 Alta</option>
                                    <option value="media">🟡 Media</option>
                                    <option value="baja">🟢 Baja</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label text-secondary fw-bold small text-uppercase">Presupuesto máx (€)</label>
                                <input type="number" name="presupuestoMaximo" class="form-control" placeholder="Ej. 2000" step="0.01" min="0" value="{{#demanda.presupuestoMaximo}}{{demanda.presupuestoMaximo}}{{/demanda.presupuestoMaximo}}">
                            </div>

                            <div class="col-12 mt-4 d-flex justify-content-end">
                                <button type="submit" class="btn btn-success px-4 fw-bold rounded-pill">
                                    <i class="fas fa-bullhorn me-2"></i> Publicar Demanda
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>
</div>

{{> footer}}
