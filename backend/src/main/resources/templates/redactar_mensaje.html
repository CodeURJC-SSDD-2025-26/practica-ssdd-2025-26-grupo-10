<!DOCTYPE html>
<html lang="es">
{{> head}}
<body class="bg-theme-dark">
{{> header}}

<main class="container my-5 py-5 min-vh-100">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow-sm border-top border-success border-4 rounded-4 overflow-hidden">
                <div class="card-body p-4 p-md-5">
                    <div class="d-flex align-items-center mb-4">
                        <div class="bg-success bg-opacity-10 p-3 rounded-circle me-3">
                            <i class="fas fa-paper-plane text-success fa-2x"></i>
                        </div>
                        <div>
                            <h2 class="fw-bold text-dark mb-0">Redactar Nuevo Mensaje</h2>
                            <p class="text-muted small mb-0">Envía una propuesta formal a la empresa colaboradora.</p>
                        </div>
                    </div>

                    <form action="/mensajes/enviar" method="POST">
                        {{#_csrf}}<input type="hidden" name="_csrf" value="{{token}}">{{/_csrf}}
                        
                        <div class="mb-4">
                            <label class="form-label fw-bold small text-uppercase text-secondary">Destinatario</label>
                            <input type="hidden" name="receptorId" value="{{receptor.id}}">
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0"><i class="fas fa-building text-muted"></i></span>
                                <input type="text" class="form-control bg-light border-start-0" value="{{receptor.nombreComercial}}" readonly>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label for="asunto" class="form-label fw-bold small text-uppercase text-secondary">Asunto / Referencia</label>
                            <div class="input-group">
                                <span class="input-group-text bg-white border-end-0"><i class="fas fa-heading text-muted"></i></span>
                                <input type="text" class="form-control border-start-0" id="asunto" name="asunto" value="{{asunto}}" required>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label for="contenido" class="form-label fw-bold small text-uppercase text-secondary">Cuerpo del Mensaje</label>
                            <textarea class="form-control" id="contenido" name="contenido" rows="6" placeholder="Escribe aquí tu propuesta detallada..." required></textarea>
                        </div>

                        <div class="d-flex justify-content-between align-items-center pt-3 border-top mt-4">
                            <a href="javascript:history.back()" class="btn btn-outline-secondary rounded-pill px-4">
                                <i class="fas fa-arrow-left me-2"></i>Cancelar
                            </a>
                            <button type="submit" class="btn btn-success rounded-pill px-5 py-2 fw-bold shadow-sm">
                                <i class="fas fa-paper-plane me-2"></i>Enviar Mensaje
                            </button>
                        </div>
                    </form>
                </div>
            </div>
            
            <div class="mt-4 text-center">
                <p class="text-muted small">
                    <i class="fas fa-shield-alt text-success me-2"></i>Tu comunicación industrial está protegida por nuestra política de privacidad.
                </p>
            </div>
        </div>
    </div>
</main>

{{> footer}}
</body>
</html>
