{{> head}}
<body class="bg-theme-dark">
{{> header}}

<div class="container-fluid">
    <div class="row min-vh-100">
        {{> sidebar}}

        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4"
              data-tipo="{{oferta.tipoResiduo}}" 
              data-unidad="{{oferta.unidad}}" 
              data-disponibilidad="{{oferta.disponibilidad}}"
              data-estado="{{oferta.estado}}">
            <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                <h1 class="h2 text-dark fw-bold">Editar Activo <span class="text-muted fs-6">#REF-{{oferta.id}}</span></h1>
                <div class="btn-toolbar mb-2 mb-md-0">
                    <a href="/dashboard/mis-ofertas" class="btn btn-sm btn-outline-secondary rounded-pill"><i class="fas fa-arrow-left me-1"></i> Cancelar</a>
                </div>
            </div>

            <div class="card card-modern border-top-primary">
                <div class="card-body p-4">
                    {{#errores}}
                    <div class="alert alert-danger d-flex align-items-center" role="alert">
                        <i class="fas fa-exclamation-triangle me-2"></i>
                        <span>{{defaultMessage}}</span>
                    </div>
                    {{/errores}}
                    <form action="/ofertas/{{oferta.id}}/editar" method="POST" enctype="multipart/form-data" class="needs-validation" novalidate="">
                        {{#_csrf}}<input type="hidden" name="_csrf" value="{{token}}">{{/_csrf}}
                        <div class="row g-3">
                            <div class="col-md-8">
                                <label for="titulo" class="form-label text-secondary fw-bold small text-uppercase">Título del Activo <span class="text-danger">*</span></label>
                                <input type="text" name="titulo" class="form-control" id="titulo" value="{{oferta.titulo}}" required="">
                            </div>
                            <div class="col-md-4">
                                <label for="tipo" class="form-label text-secondary fw-bold small text-uppercase">Tipo <span class="text-danger">*</span></label>
                                <select name="tipoResiduo" class="form-select" id="tipo" required="">
                                    <option value="residuo_metalico">Residuo: Metal</option>
                                    <option value="residuo_madera">Residuo: Madera</option>
                                    <option value="residuo_plastico">Residuo: Plástico</option>
                                    <option value="residuo_quimico">Residuo: Químico</option>
                                    <option value="maquinaria">Maquinaria</option>
                                    <option value="espacio">Espacio</option>
                                </select>
                            </div>

                            <div class="col-12">
                                <label for="descripcion" class="form-label text-secondary fw-bold small text-uppercase">Descripción Detallada <span class="text-danger">*</span></label>
                                <textarea name="descripcion" class="form-control" id="descripcion" rows="4" required="">{{oferta.descripcion}}</textarea>
                            </div>

                            <div class="col-md-4">
                                <label for="cantidad" class="form-label text-secondary fw-bold small text-uppercase">Cantidad <span class="text-danger">*</span></label>
                                <div class="input-group">
                                    <input type="number" name="cantidad" class="form-control" id="cantidad" value="{{oferta.cantidad}}" min="0" required="">
                                    <select class="form-select" id="unidad" name="unidad" required>
                                        <option value="kg">kg</option>
                                        <option value="uds">unidades</option>
                                        <option value="L">litros</option>
                                        <option value="t">toneladas</option>
                                        <option value="m2">m²</option>
                                    </select>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <label for="precio" class="form-label text-secondary fw-bold small text-uppercase">Precio (€)</label>
                                <input type="number" name="precio" class="form-control" id="precio" value="{{oferta.precio}}" step="0.01" min="0">
                            </div>
                            <div class="col-md-4">
                                <label for="disponibilidad" class="form-label text-secondary fw-bold small text-uppercase">Disponibilidad</label>
                                <select class="form-select" id="disponibilidad" name="disponibilidad">
                                    <option value="inmediata">Inmediata</option>
                                    <option value="1semana">En 1 semana</option>
                                    <option value="consultar">Consultar</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label for="estado" class="form-label text-secondary fw-bold small text-uppercase">Estado</label>
                                <select class="form-select" id="estado" name="estado">
                                    <option value="ACTIVA">ACTIVA</option>
                                    <option value="PAUSADA">PAUSADA</option>
                                </select>
                            </div>

                            <div class="col-12">
                                <label for="imagenFile" class="form-label text-secondary fw-bold small text-uppercase">Fotografía del Activo</label>
                                <div class="mb-2">
                                    <small class="text-muted">Imagen actual:</small><br>
                                    <img src="/images/oferta/{{oferta.id}}" alt="Imagen del activo" class="img-thumbnail rounded object-fit-cover mt-2 mb-3 shadow-sm" style="max-height: 200px;" onerror="this.src='/img/logo.webp';">
                                </div>
                                <input class="form-control" type="file" id="imagenFile" name="imagenFile" accept="image/*">
                                <div class="form-text">Deja vacío para conservar la imagen actual.</div>
                            </div>

                            <div class="col-12 mt-4 d-flex justify-content-end">
                                <button type="submit" class="btn btn-primary px-4 fw-bold">
                                    <i class="fas fa-save me-2"></i> Guardar Cambios
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>
</div>

{{> footer}}
<script>
    document.addEventListener("DOMContentLoaded", function() {
        const main = document.querySelector('main');
        const tipo = main.getAttribute('data-tipo');
        const unidad = main.getAttribute('data-unidad');
        const disponibilidad = main.getAttribute('data-disponibilidad');
        const estado = main.getAttribute('data-estado');

        if (tipo) document.getElementById("tipo").value = tipo;
        if (unidad) document.getElementById("unidad").value = unidad;
        if (disponibilidad) document.getElementById("disponibilidad").value = disponibilidad;
        if (estado) document.getElementById("estado").value = estado;
    });
</script>
