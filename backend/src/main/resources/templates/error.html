{{> header}}

<div class="container py-5 mt-5">
    <div class="row justify-content-center py-5">
        <div class="col-md-8 col-lg-6 text-center">
            <div class="card shadow-lg border-0 rounded-4 p-5">
                <div class="mb-4">
                    <i class="fas fa-exclamation-circle text-danger display-1 opacity-25"></i>
                </div>
                <h1 class="display-5 fw-bold text-dark mb-3">¡Vaya!</h1>
                <p class="lead text-muted mb-4">Algo no ha salido como esperábamos o no tienes permisos para acceder aquí.</p>
                
                {{#status}}
                <div class="badge bg-danger-soft text-danger fs-6 px-4 py-2 mb-4">Error {{status}}</div>
                {{/status}}

                <div class="d-grid gap-2 d-md-flex justify-content-md-center mt-2">
                    <a href="/dashboard" class="btn btn-primary px-4 py-2 fw-bold rounded-pill mx-1">Ir al Dashboard</a>
                    <a href="/" class="btn btn-outline-secondary px-4 py-2 fw-bold rounded-pill mx-1">Volver al Inicio</a>
                </div>
            </div>
        </div>
    </div>
</div>

{{> footer}}
