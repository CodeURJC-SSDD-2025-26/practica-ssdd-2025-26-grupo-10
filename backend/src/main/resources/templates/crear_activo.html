{{> head}}
<body class="bg-theme-dark">
{{> header}}

<div class="container-fluid">
    <div class="row min-vh-100">

        <!-- Sidebar -->
        {{> sidebar}}

        <!-- Main Content -->
        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">
            <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                <h1 class="h2 text-dark fw-bold">Publicar Nueva Oferta</h1>
                <div class="btn-toolbar mb-2 mb-md-0">
                    <a href="/dashboard/mis-ofertas" class="btn btn-sm btn-outline-secondary rounded-pill">
                        <i class="fas fa-arrow-left me-1"></i> Cancelar
                    </a>
                </div>
            </div>

            <div class="card card-modern border-top-success">
                <div class="card-body p-4">
                    {{#error}}
                    <div class="alert alert-danger d-flex align-items-center shadow-sm" role="alert">
                        <i class="fas fa-exclamation-circle me-2 fs-5"></i>
                        <span>{{error}}</span>
                    </div>
                    {{/error}}
                    {{#errores}}
                    <div class="alert alert-danger d-flex align-items-center" role="alert">
                        <i class="fas fa-exclamation-triangle me-2"></i>
                        <span>{{defaultMessage}}</span>
                    </div>
                    {{/errores}}
                    <form action="/oferta/nueva" method="POST" enctype="multipart/form-data" class="needs-validation" novalidate>
                        {{#_csrf}}<input type="hidden" name="_csrf" value="{{token}}">{{/_csrf}}
                        <div class="row g-3">
                            <div class="col-md-8">
                                <label for="titulo" class="form-label text-secondary fw-bold small text-uppercase">Título del Activo
                                    <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="titulo" name="titulo" placeholder="Ej. Lote de Palets Europeos" value="{{#oferta.titulo}}{{oferta.titulo}}{{/oferta.titulo}}" required>
                                <div class="invalid-feedback">Por favor, completa este campo.</div>
                            </div>
                            <div class="col-md-4">
                                <label for="tipo" class="form-label text-secondary fw-bold small text-uppercase">Tipo <span class="text-danger">*</span></label>
                                <select class="form-select" id="tipo" name="tipoResiduo" required>
                                    <option value="" selected disabled>Seleccionar...</option>
                                    <option value="residuo_metalico">Residuo Metálico</option>
                                    <option value="residuo_madera">Residuo de Madera</option>
                                    <option value="residuo_plastico">Residuo Plástico</option>
                                    <option value="residuo_quimico">Residuo Químico</option>
                                    <option value="maquinaria">Alquiler Maquinaria</option>
                                    <option value="espacio">Alquiler Espacio</option>
                                </select>
                            </div>

                            <div class="col-12">
                                <label for="descripcion" class="form-label text-secondary fw-bold small text-uppercase">Descripción Detallada
                                    <span class="text-danger">*</span></label>
                                <textarea class="form-control" id="descripcion" name="descripcion" rows="4" placeholder="Describe el estado, origen y condiciones de recogida..." required>{{#oferta.descripcion}}{{oferta.descripcion}}{{/oferta.descripcion}}</textarea>
                            </div>

                            <div class="col-md-4">
                                <label for="cantidad" class="form-label text-secondary fw-bold small text-uppercase">Cantidad y Unidad
                                    <span class="text-danger">*</span></label>
                                <div class="input-group">
                                    <input type="number" class="form-control" id="cantidad" name="cantidad" placeholder="Ej. 500" min="0" value="{{#oferta.cantidad}}{{oferta.cantidad}}{{/oferta.cantidad}}" required>
                                    <select class="form-select" id="unidadMedida" name="unidad" required>
                                        {{#listaUnidades}}
                                        <option value="{{.}}">{{.}}</option>
                                        {{/listaUnidades}}
                                    </select>
                                </div>
                                <div class="invalid-feedback">Indica la cantidad.</div>
                            </div>

                            <div class="col-md-4">
                                <label for="precio" class="form-label text-secondary fw-bold small text-uppercase">Precio (€)</label>
                                <input type="number" class="form-control" id="precio" name="precio" placeholder="Ej. 1500" step="0.01" min="0" value="{{#oferta.precio}}{{oferta.precio}}{{/oferta.precio}}">
                            </div>
                            <div class="col-md-4">
                                <label for="disponibilidad" class="form-label text-secondary fw-bold small text-uppercase">Disponibilidad</label>
                                <select class="form-select" id="disponibilidad" name="disponibilidad">
                                    {{#listaDisponibilidades}}
                                    <option value="{{.}}">{{.}}</option>
                                    {{/listaDisponibilidades}}
                                </select>
                            </div>

                            <div class="col-12">
                                <label for="imagen" class="form-label text-secondary fw-bold small text-uppercase">Fotografía del Activo</label>
                                <input class="form-control" type="file" id="imagen" name="imagenFile" accept="image/*">
                                <div class="form-text">Formatos aceptados: JPG, PNG, WEBP. Máx 5 MB.</div>
                            </div>

                            <div class="col-12 mt-4 d-flex justify-content-end">
                                <button type="submit" class="btn btn-primary px-4 fw-bold">
                                    <i class="fas fa-save me-2"></i> Publicar Oferta
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>
</div>

<script src="/js/form-validation.js"></script>
{{> footer}}
